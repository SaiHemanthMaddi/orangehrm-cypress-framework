name: Cypress Tests

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      spec:
        description: 'Specific test spec to run (leave empty for auto scope/full)'
        required: false
        type: string
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cypress-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decide Test Scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          MANUAL_SPEC="${{ github.event.inputs.spec || '' }}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$MANUAL_SPEC" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_spec=$MANUAL_SPEC" >> "$GITHUB_OUTPUT"
            echo "reason=Manual run with explicit spec" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "schedule" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_spec=cypress/e2e/**/*.cy.js" >> "$GITHUB_OUTPUT"
            echo "reason=Scheduled/manual run -> full regression" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE=""
          HEAD="${{ github.sha }}"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            BASE="${{ github.event.before }}"
          fi

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_spec=cypress/e2e/**/*.cy.js" >> "$GITHUB_OUTPUT"
            echo "reason=No valid base SHA -> full regression" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE" "$HEAD")
          RUN_ALL=false
          SPECS=()

          for file in "${CHANGED_FILES[@]}"; do
            case "$file" in
              package.json|package-lock.json|cypress.config.js|cypress.config.ts|.github/workflows/cypress-tests.yml|cypress/support/*)
                RUN_ALL=true
                ;;
              cypress/e2e/*.cy.js|cypress/e2e/**/*.cy.js)
                SPECS+=("$file")
                ;;
            esac
          done

          if [[ "$RUN_ALL" == "true" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_spec=cypress/e2e/**/*.cy.js" >> "$GITHUB_OUTPUT"
            echo "reason=Core config/support change -> full regression" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ${#SPECS[@]} -eq 0 ]]; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_spec=" >> "$GITHUB_OUTPUT"
            echo "reason=No changed Cypress specs" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UNIQUE_SPECS=$(printf '%s\n' "${SPECS[@]}" | sort -u | paste -sd, -)
          echo "run_tests=true" >> "$GITHUB_OUTPUT"
          echo "test_spec=$UNIQUE_SPECS" >> "$GITHUB_OUTPUT"
          echo "reason=Changed spec scoped run" >> "$GITHUB_OUTPUT"

      - name: Run Cypress tests
        if: steps.scope.outputs.run_tests == 'true'
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ inputs.browser || matrix.browser }}
          spec: ${{ steps.scope.outputs.test_spec }}
          config-file: cypress.config.js
        env:
          CYPRESS_BASE_URL: https://opensource-demo.orangehrmlive.com

      - name: Skip Note
        if: steps.scope.outputs.run_tests != 'true'
        run: echo "Skipping Cypress run. Reason: ${{ steps.scope.outputs.reason }}"

      - name: Generate Allure Report
        if: always() && steps.scope.outputs.run_tests == 'true'
        run: |
          npm run allure:generate || echo "Allure report generation skipped"

      - name: Upload Allure Report
        if: always() && steps.scope.outputs.run_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Upload Cypress Screenshots
        if: failure() && steps.scope.outputs.run_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ github.run_number }}
          path: cypress/screenshots/
          retention-days: 7

      - name: Upload Cypress Videos
        if: failure() && steps.scope.outputs.run_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ github.run_number }}
          path: cypress/videos/
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Browser**: ${{ inputs.browser || matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Spec**: ${{ steps.scope.outputs.test_spec || 'Skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Reason**: ${{ steps.scope.outputs.reason }}" >> $GITHUB_STEP_SUMMARY
